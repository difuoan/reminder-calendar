# ============================================================
# Nginx virtual-host configuration
#
# Routes all requests through public/index.php (front controller)
# so the PHP router can dispatch to the correct handler.
# Static assets (CSS/JS/images) are served directly by Nginx.
# ============================================================

server {
    listen 80;
    server_name _;

    # Document root points to the public/ directory only —
    # source files above it are never directly accessible
    root /var/www/html/public;
    index index.php;

    # Serve existing static files directly; everything else
    # falls through to the PHP front controller
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP files to PHP-FPM
    location ~ \.php$ {
        fastcgi_pass   127.0.0.1:9000;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;
    }

    # Deny access to hidden files (e.g. .env, .git)
    location ~ /\. {
        deny all;
    }
}
